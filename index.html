<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Respen TV - Pemutar IPTV Indonesia &amp; Global</title>
    
    <!-- PWA Meta Tags & Manifest -->
    <link rel="manifest" href="./manifest.json" />

    <!-- Favicon fallback -->
    <link rel="icon" type="image/svg+xml" href="./logo.svg" />

  <body class="bg-slate-950 text-slate-100 selection:bg-indigo-500/30">
    <div id="root"></div>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('Service Worker berhasil didaftarkan dengan scope:', reg.scope))
            .catch((err) => console.log('Gagal mendaftarkan Service Worker:', err));
        });
      }
    </script>
  </body>
